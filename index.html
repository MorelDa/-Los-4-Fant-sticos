<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Cuatro Fantásticos: Primeros pasos - Disney+</title>
    <link href="https://fonts.googleapis.com/css2?family=Avenir:wght@400;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(180deg, #0c1a2c 0%, #040714 100%); color: #f9f9f9; min-height: 100vh; }
        .hero {
            position: relative; min-height: 75vh; padding: 40px 5%;
            background: linear-gradient(to right, rgba(4,7,20,0.95) 0%, rgba(4,7,20,0.6) 50%, rgba(4,7,20,0.8) 100%),
                        url('https://media.themoviedb.org/t/p/w300_and_h450_face/ckfiXWGEMWrUP53cc6QyHijLlhl.jpg') center/cover;
            display: flex; align-items: flex-end;
        }
        .hero-content { display: grid; grid-template-columns: 180px 1fr; gap: 30px; max-width: 900px; }
        @media (max-width: 600px) { .hero-content { grid-template-columns: 1fr; text-align: center; } .poster { display: none; } }
        .poster { width: 100%; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .info h1 { font-size: 2.8rem; font-weight: 800; margin-bottom: 10px; }
        .meta { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 15px; font-size: 14px; color: #a0a0a0; }
        @media (max-width: 600px) { .meta { justify-content: center; } }
        .genres { color: #7a8999; font-size: 13px; margin-bottom: 15px; }
        .synopsis { color: #c0c0c0; line-height: 1.6; margin-bottom: 25px; }
        .buttons { display: flex; gap: 15px; flex-wrap: wrap; }
        @media (max-width: 600px) { .buttons { justify-content: center; } }
        .btn { display: flex; align-items: center; gap: 10px; padding: 14px 28px; border: none; border-radius: 6px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-play { background: #f9f9f9; color: #040714; }
        .btn-play:hover { background: #e5e5e5; transform: scale(1.05); }
        .btn-list { background: rgba(255,255,255,0.1); color: #f9f9f9; }
        .player-area { padding: 30px 5%; }
        .srvs { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .srv { background: rgba(255,255,255,0.1); border: none; color: #a0a0a0; padding: 10px 20px; border-radius: 6px; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .srv:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .srv.active { background: #0063e5; color: #fff; }
        .video-box { aspect-ratio: 16/9; background: #000; border-radius: 10px; overflow: hidden; max-width: 1100px; }
        .video-box iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero-content">
            <img class="poster" src="https://media.themoviedb.org/t/p/w300_and_h450_face/ckfiXWGEMWrUP53cc6QyHijLlhl.jpg" alt="">
            <div class="info">
                <h1>Los Cuatro Fantásticos: Primeros pasos</h1>
                <div class="meta">
                    <span>2025</span>
                    <span>1h 55m</span>
                    <span>HD</span>
                </div>
                <p class="genres">Ciencia ficción • Aventura • Acción</p>
                <p class="synopsis">Con un mundo retrofuturista inspirado en los años 60 como telón de fondo, la Primera Familia de Marvel deberá hacer frente a su mayor desafío hasta la fecha. Obligados a buscar el ...</p>
                <div class="buttons">
                    <button class="btn btn-play" onclick="document.querySelector('.player-area').scrollIntoView({behavior:'smooth'})">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M6 4l15 8-15 8z"/></svg>
                        PLAY
                    </button>
                    <button class="btn btn-list">+ Mi Lista</button>
                </div>
            </div>
        </div>
    </div>
    <div class="player-area">
        <div class="srvs"><button class="srv active" onclick="sw(0)">Servidor 1</button></div>
        <div class="video-box"><iframe id="d-0" src="https://vimeos.net/embed-f20c32y5y4ff.html" style="display:block" allowfullscreen></iframe></div>
    </div>
    <script>
        const t = 1;
        function sw(i) {
            for(let x=0;x<t;x++) { document.getElementById('d-'+x).style.display = 'none'; document.querySelectorAll('.srv')[x].classList.remove('active'); }
            document.getElementById('d-'+i).style.display = 'block';
            document.querySelectorAll('.srv')[i].classList.add('active');
        }
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
